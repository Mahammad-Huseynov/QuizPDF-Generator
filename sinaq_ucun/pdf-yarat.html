<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Suallar PDF Hazırlayıcı</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #f5f5f5; }
        .no-print { text-align: center; margin-bottom: 30px; }
        .btn { padding: 15px 30px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; }
        
        .page { background: white; padding: 40px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 900px; margin: 0 auto; }
        .question-item { margin-bottom: 25px; page-break-inside: avoid; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .q-text { font-weight: bold; font-size: 16px; margin-bottom: 10px; display: block; }
        .opt { display: block; margin-left: 20px; font-size: 14px; margin-top: 4px; }
        .correct { color: #27ae60; font-weight: bold; }
        
        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            .page { box-shadow: none; max-width: 100%; width: 100%; padding: 0; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <h1>Sualları PDF-ə Çevir</h1>
    <p>Düyməyə basdıqdan sonra açılan pəncərədə <b>"Save as PDF"</b> seçin.</p>
    <button class="btn" onclick="window.print()">PDF Kimi Yadda Saxla</button>
</div>

<div class="page" id="output"></div>

<script src="questions.js"></script> 
<script>
    const output = document.getElementById('output');
    
    if (typeof questionsData !== 'undefined') {
        questionsData.forEach((q, index) => {
            let html = `
                <div class="question-item">
                    <span class="q-text">${index + 1}. ${q.question} (№${q.question_number})</span>
                    <span class="opt correct">A) ${q.correct_answer}</span>
            `;
            
            q.other_answers.forEach((opt, i) => {
                const letter = String.fromCharCode(66 + i); // B, C, D, E...
                html += `<span class="opt">${letter}) ${opt}</span>`;
            });
            
            html += `</div>`;
            output.innerHTML += html;
        });
    } else {
        output.innerHTML = "<h1>Xəta: questionsData tapılmadı! questions.js faylını yoxlayın.</h1>";
    }
</script>

</body>
</html>
